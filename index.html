<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zazu Media</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Wallet Screen (shown immediately) -->
    <section id="wallet" class="screen active">
      <h2>💰 Your Wallet</h2>
      <div class="bal">₦<span id="bal-val">0.00</span></div>
      <button id="btn-play-bunny" class="primary">📺 Bunny Test (Mini App)</button>
      <button class="secondary" onclick="window.open('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4', '_blank')">📺 Open in Chrome</button>
      <button id="btn-play-aljazeera" class="secondary">📺 Al Jazeera</button>
      <button id="btn-back" class="text-btn" style="display:none;">← Back</button>
    </section>

    <!-- Hidden Video Player -->
    <section id="player" class="screen hidden">
      <div class="player-box">
        <video id="vid" controls playsinline disablepictureinpicture controlsList="nodownload"></video>
        <div id="wm" class="watermark"></div>
      </div>
      <p class="info">Forensic watermark active</p>
      <button id="btn-stop" class="text-btn">← Stop &amp; Return</button>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
