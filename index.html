<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zazu Media</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin:0; background:#0a0a0f; color:#fff; font-family:system-ui; padding:16px; }
    h2 { text-align:center; }
    .bal { font-size:42px; font-weight:800; text-align:center; margin:20px 0; color:#00cec9; }
    button { width:100%; padding:14px; margin:8px 0; border:none; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; }
    .primary { background:#6c5ce7; color:#fff; }
    .secondary { background:#2d3436; color:#fff; border:1px solid #636e72; }
    .text-btn { background:none; color:#00cec9; }
    .hidden { display: none !important; }
    .player-box { position:relative; width:100%; aspect-ratio:16/9; background:#000; border-radius:12px; overflow:hidden; margin:16px 0; }
    video { width:100%; height:100%; object-fit:contain; display:block; background:black; }
    .watermark { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; font-family:monospace; font-size:14px; color:rgba(255,255,255,0.25); white-space:nowrap; animation:drift 22s linear infinite; z-index:10; }
    @keyframes drift { 0%{transform:translate(-100%,-100%)} 25%{transform:translate(0,0)} 50%{transform:translate(100%,100%)} 75%{transform:translate(0,200%)} 100%{transform:translate(-100%,100%)} }
    .info { text-align:center; font-size:13px; opacity:0.7; margin-bottom:8px; }
    .section-title { text-align:center; margin-top:24px; margin-bottom:8px; font-weight:bold; opacity:0.8; }
  </style>
</head>
<body>
  <div id="wallet-screen">
    <h2>💰 Your Wallet</h2>
    <div class="bal">₦<span id="bal-val">0.00</span></div>

    <div class="section-title">Test Stream</div>
    <button class="primary" onclick="playVideo('https://www.w3schools.com/html/mov_bbb.mp4')">📺 Test Video (Mini App)</button>
    <button class="secondary" onclick="window.open('https://www.w3schools.com/html/mov_bbb.mp4', '_blank')">📺 Test Video (Chrome)</button>

    <div class="section-title">Live Channels (Stable Test Streams)</div>
    <button class="primary" onclick="playVideo('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">📺 Mux HLS Test</button>
    <button class="primary" onclick="playVideo('https://cph-p2p-msl.akamaized.net/hls/live/2000341/test/master.m3u8')">📺 Akamai HLS Test</button>
    <button class="primary" onclick="playVideo('https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8')">📺 Red Bull TV (Sports)</button>
    <button class="secondary" onclick="window.open('https://rbmn-live.akamaized.net/hls/live/590964/BoRB-AT/master.m3u8', '_blank')">📺 Red Bull TV (Chrome)</button>

    <div class="section-title">Coming Soon (via IPTV Auto‑Update)</div>
    <button class="primary" disabled style="opacity:0.5;">📺 Arewa 24 (Backend Proxy Ready Soon)</button>
    <button class="primary" disabled style="opacity:0.5;">📺 Channels TV (Backend Proxy Ready Soon)</button>
    <button class="primary" disabled style="opacity:0.5;">📺 Al Jazeera (Backend Proxy Ready Soon)</button>
    <button class="primary" disabled style="opacity:0.5;">📺 Saira Movies (Backend Proxy Ready Soon)</button>
  </div>

  <div id="player-screen" class="hidden">
    <div class="player-box">
      <video id="vid" controls playsinline disablepictureinpicture controlsList="nodownload"></video>
      <div id="wm" class="watermark"></div>
    </div>
    <p class="info">Forensic watermark active – recording leaks are traceable</p>
    <button class="text-btn" onclick="closePlayer()">← Back to Wallet</button>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand(); tg.enableClosingConfirmation();

    const API = "https://zazu-backend-1.onrender.com";

    async function loadWallet() {
      const u = tg.initDataUnsafe?.user;
      if (!u) { document.getElementById('bal-val').textContent = "0.00"; return; }
      try {
        const res = await fetch(API + '/api/user/' + u.id, { headers: { Authorization: 'Bearer ' + tg.initData } });
        if (res.ok) {
          const data = await res.json();
          document.getElementById('bal-val').textContent = (data.balance_kobo/100).toFixed(2);
        }
      } catch(e) {}
    }
    loadWallet();

    let hls = null;

    function show(id) {
      document.getElementById('wallet-screen').classList.add('hidden');
      document.getElementById('player-screen').classList.add('hidden');
      document.getElementById(id).classList.remove('hidden');
    }

    function playVideo(url) {
      show('player-screen');
      const vid = document.getElementById('vid');
      const wm = document.getElementById('wm');

      const updateWm = () => {
        wm.textContent = 'ZAZU:' + (tg.initDataUnsafe?.user?.id || 'unknown') + '|' + new Date().toLocaleTimeString() + ' ';
      };
      updateWm();
      setInterval(updateWm, 1500);

      if (url.endsWith('.mp4')) {
        vid.src = url;
        vid.play().catch(()=>{});
        return;
      }

      if (Hls.isSupported()) {
        if (hls) hls.destroy();
        hls = new Hls({ enableWorker: true, lowLatencyMode: false });
        hls.loadSource(url);
        hls.attachMedia(vid);
        hls.on(Hls.Events.MANIFEST_PARSED, () => vid.play().catch(()=>{}));
      } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
        vid.src = url;
        vid.play().catch(()=>{});
      }
    }

    function closePlayer() {
      if (hls) { hls.destroy(); hls = null; }
      const vid = document.getElementById('vid');
      vid.src = '';
      vid.removeAttribute('src');
      show('wallet-screen');
    }
  </script>
</body>
</html>
